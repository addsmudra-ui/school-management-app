name: school_management_app
description: "A professional School Management App for Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.11.0
  cloud_firestore: ^5.6.4
  firebase_auth: ^5.5.4
  firebase_messaging: ^15.3.4
  
  # UI & UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lucide_icons: any   # ఇక్కడ 'any' అని మార్చాను, ఇది సరైన వెర్షన్ తీసుకుంటుంది
  intl: ^0.19.0
  
  # State Management
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true