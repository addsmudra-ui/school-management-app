name: school_management_app
description: "A professional School Management App for Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase - 'any' వాడటం వల్ల బిల్డ్ ఫెయిల్ అవ్వదు
  firebase_core: any
  cloud_firestore: any
  firebase_auth: any
  firebase_messaging: any
  
  # UI & UX
  google_fonts: any
  flutter_svg: any
  lucide_icons: any 
  intl: any
  
  # State Management
  flutter_riverpod: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true