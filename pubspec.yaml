name: school_management_app
description: "A professional School Management App for Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (Stable Versions)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10  # ఇక్కడ వెర్షన్ తగ్గించాను (Downgraded for stability)
  
  # UI & UX
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lucide_icons: any 
  intl: ^0.19.0
  
  # State Management
  flutter_riverpod: ^2.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true